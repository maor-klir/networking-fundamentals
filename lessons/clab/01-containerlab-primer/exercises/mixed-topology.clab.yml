# Lesson 1: First Containerlab Topology
# Exercise 5: Challenge - Add a Linux Host

name: mixed-topology

topology:
  nodes:
    # SR Linux node
    router:
      kind: srl
      image: ghcr.io/nokia/srlinux:24.10.1

    # Alpine Linux host
    host1:
      kind: linux
      image: alpine:3.20

  links:
    - endpoints: ["router:e1-1", "host1:eth1"]
